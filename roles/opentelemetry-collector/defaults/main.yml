otel_secret: open-telemetry-collector
otel_namespace: observability
otel_collector_helm_repo: oci://dp.apps.rancher.io/charts/opentelemetry-collector
otel_collector_release_name: opentelemetry-collector
otel_collector_helm_version: 0.149.0
suse_ai_registry_secret: suse-ai-registry
suse_observability_namespace: suse-observability
endpoint: "{{ otel_endpoint | default('http://suse-observability-otel-collector.' ~ suse_observability_namespace ~ '.svc.cluster.local:4317', true) }}"
otel_topology_endpoint: "{{ otel_topology_ep | default('http://suse-observability-router.' ~ suse_observability_namespace ~ '.svc.cluster.local:8080', true) }}"
otel_cluster_name: local
otel_suse_ai_namespace: suse-private-ai
otel_collector_image_registry: registry.suse.com
otel_collector_image_repository: ai/containers/suse-ai-opentelemetry-collector
otel_collector_image_tag: 0.149.0
otel_scrape_milvus: true
otel_milvus_endpoint: milvus.suse-private-ai.svc.cluster.local:9091
otel_scrape_qdrant: true
otel_qdrant_endpoint: qdrant.suse-private-ai.svc.cluster.local:6333
otel_scrape_opensearch: true
otel_opensearch_endpoint: http://opensearch-cluster-master-headless.suse-private-ai.svc.cluster.local:9200
otel_opensearch_username: admin
otel_opensearch_password: MySecurePass123
otel_vllm_release_name: vllm
otel_vllm_namespace: suse-private-ai
otel_gpu_operator_namespace: gpu-operator
